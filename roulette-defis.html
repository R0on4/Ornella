<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Roulette des Défis 🎯 — Miminella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="particles-bg" aria-hidden="true"></div>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Miminella 💖</a>
      <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Accueil</a>
        <a href="galerie.html" class="nav-link">Galerie</a>
        <a href="timeline.html" class="nav-link">Timeline</a>
        <a href="jeu.html" class="nav-link">Jeux</a>
        <a href="blog.html" class="nav-link">Rêves</a>
        <a href="roulette-mots.html" class="nav-link">Mots Doux</a>
        <a href="roulette-defis.html" class="nav-link active">Défis</a>
        <a href="wishlist.html" class="nav-link">Wishlist</a>
        <a href="playlist.html" class="nav-link">Playlist</a>
      </div>
    </div>
  </nav>
  <button id="theme-toggle" class="theme-btn" aria-label="Changer le thème"><span class="theme-icon">🌙</span></button>
  <main class="page-main">
    <div class="container">
      <div class="page-header">
        <div class="page-header__badge">🎯 Une fois par jour</div>
        <h1 class="page-header__title">Roulette des Défis 🎯</h1>
        <p class="page-header__subtitle">Ose tourner la roue pour relever un défi rigolo — si tu es courageuse 😏 (une fois par jour)</p>
      </div>

      <div class="roulette-wrap">
        <div class="wheel-container">
          <div class="wheel-pointer"></div>
          <canvas id="wheel-canvas" width="420" height="420" class="wheel-canvas"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">🔥 Lancer le défi</button>

        <div class="result-display" id="result">
          <div class="result-title">Prêt(e) ? 🎯</div>
          <div class="result-text">Tourne la roue et relève le challenge !</div>
        </div>
      </div>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script>
    const defis = [
      { emoji: '🏋️', text: 'Faire 20 pompes d\'affilée !', difficulty: 'easy' },
      { emoji: '🐷', text: 'Imiter le cochon pendant 30 secondes', difficulty: 'easy' },
      { emoji: '🎤', text: 'Faire un compliment en chantant', difficulty: 'medium' },
      { emoji: '💃', text: 'Danser sur une chanson embarrassante', difficulty: 'medium' },
      { emoji: '😂', text: 'Raconter une blague vraiment très nulle', difficulty: 'easy' },
      { emoji: '💪', text: 'Faire 15 squats sans s\'arrêter', difficulty: 'hard' },
      { emoji: '🍑', text: 'Twerker pendant 20 secondes', difficulty: 'hard' },
      { emoji: '📸', text: 'Prendre une photo/vidéo rigolote et l\'envoyer', difficulty: 'easy' },
      { emoji: '📖', text: 'Inventer une histoire absurde en 2 minutes', difficulty: 'medium' },
      { emoji: '🤸', text: 'Faire un prank marrant à ta maman', difficulty: 'hard' },
      { emoji: '👕', text: 'Mettre le plus de vêtements possible sur toi', difficulty: 'medium' },
      { emoji: '🎨', text: 'Dessiner un portrait de l\'autre les yeux fermés', difficulty: 'medium' }
    ];

    const diffText = { easy: 'Facile 😊', medium: 'Moyen 🤔', hard: 'Difficile 😅' };

    function renderResult(defi) {
      return `
        <div class="result-title">${defi.emoji} Ton défi !</div>
        <div class="result-text">${defi.text}</div>
        <div class="difficulty-badge ${defi.difficulty}">${diffText[defi.difficulty]}</div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('wheel-canvas');
      if (canvas) {
        const size = Math.min(window.innerWidth - 60, 420);
        canvas.width  = size;
        canvas.height = size;
      }
      initRouletteWheel('wheel-canvas', defis, 'lastSpinDate_defis', renderResult);
    });
  </script>
</body>
</html>
