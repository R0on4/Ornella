<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Roulette Mots Doux 💝 — Miminella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="particles-bg" aria-hidden="true"></div>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Miminella 💖</a>
      <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Accueil</a>
        <a href="galerie.html" class="nav-link">Galerie</a>
        <a href="timeline.html" class="nav-link">Timeline</a>
        <a href="jeu.html" class="nav-link">Jeux</a>
        <a href="blog.html" class="nav-link">Rêves</a>
        <a href="roulette-mots.html" class="nav-link active">Mots Doux</a>
        <a href="roulette-defis.html" class="nav-link">Défis</a>
        <a href="wishlist.html" class="nav-link">Wishlist</a>
        <a href="playlist.html" class="nav-link">Playlist</a>
      </div>
    </div>
  </nav>
  <button id="theme-toggle" class="theme-btn" aria-label="Changer le thème"><span class="theme-icon">🌙</span></button>
  <main class="page-main">
    <div class="container">
      <div class="page-header">
        <div class="page-header__badge">💝 Une fois par jour</div>
        <h1 class="page-header__title">Roulette des Mots Doux 💝</h1>
        <p class="page-header__subtitle">Tourne la roue pour découvrir un mot doux ou une surprise spéciale (une fois par jour) ✨</p>
      </div>

      <div class="roulette-wrap">
        <div class="wheel-container">
          <div class="wheel-pointer"></div>
          <canvas id="wheel-canvas" width="420" height="420" class="wheel-canvas"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">🎰 Tourner la roue</button>

        <div class="result-display" id="result">
          <div class="result-title">Prête ? 💝</div>
          <div class="result-text">Clique sur le bouton pour découvrir ta surprise !</div>
        </div>
      </div>

    </div>
  </main>
  <script src="js/script.js"></script>
  <script>
    const items = [
      { type: 'mot', emoji: '💌', text: 'Tu es la plus belle personne du monde 🌟' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour un câlin de 10 minutes (quand on se reverra ♥)' },
      { type: 'mot', emoji: '☀️', text: 'Ton sourire illumine ma journée ☀️' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour un massage de 15 minutes (quand on se reverra ♥)' },
      { type: 'mot', emoji: '💭', text: 'Je pense à toi à chaque instant 💭' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour une soirée film de ton choix 🎬' },
      { type: 'mot', emoji: '🌞', text: 'Tu es mon rayon de soleil quotidien 🌞' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour un petit-déjeuner au lit (quand on se reverra ♥)' },
      { type: 'mot', emoji: '✨', text: 'Chaque jour avec toi est magique ✨' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour une photo de ce que tu veux 📸' },
      { type: 'mot', emoji: '💖', text: 'Tu es ma personne préférée au monde 💖' },
      { type: 'bon', emoji: '🎁', text: '🎁 BON pour une surprise de MimiAaron 💝' }
    ];

    function renderResult(item) {
      let html = `<div class="result-title">✨ Tu as gagné !</div>`;
      html += `<div class="result-text">${item.text}</div>`;
      if (item.type === 'bon') {
        html += `<div class="bon-display">💝 Ce bon est valable dès maintenant ! Montre-le pour l'utiliser 💝</div>`;
      }
      return html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('wheel-canvas');
      if (canvas) {
        const size = Math.min(window.innerWidth - 60, 420);
        canvas.width  = size;
        canvas.height = size;
      }
      initRouletteWheel('wheel-canvas', items, 'lastSpinDate_mots', renderResult);
    });
  </script>
</body>
</html>
